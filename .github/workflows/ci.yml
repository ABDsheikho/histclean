name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: sudo apt-get update && sudo apt-get install -y scdoc
      - run: zig build test
      - run: zig build man
      - if: github.event_name == 'push'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add doc/man/histclean.1
          git diff --staged --quiet || git commit -m "Update man page"
          git push
